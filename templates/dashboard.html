{% extends "base.html" %}

{% block content %}
<div class="row pt-4">
    <div class="col-12 mb-4">
        <h2 class="fw-bold">Welcome, {{ name }}! <span class="badge bg-primary">Dashboard</span></h2>
    </div>

    <!-- Stats Cards -->
    <div class="col-md-3 mb-4">
        <div class="card glass-card text-center p-3">
            <h5 class="text-muted">Total Detections</h5>
            <h2 class="fw-bold text-success">1,245</h2>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card glass-card text-center p-3">
            <h5 class="text-muted">Most Used</h5>
            <h2 class="fw-bold text-info">Thumbs Up</h2>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card glass-card text-center p-3">
            <h5 class="text-muted">Avg Confidence</h5>
            <h2 class="fw-bold text-warning">94.2%</h2>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card glass-card text-center p-3">
            <h5 class="text-muted">Today's Sessions</h5>
            <h2 class="fw-bold text-danger">12</h2>
        </div>
    </div>

    <!-- Charts -->
    <div class="col-md-6 mb-4">
        <div class="card glass-card p-3">
            <h5 class="fw-bold mb-3">Gesture Distribution</h5>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card glass-card p-3">
            <h5 class="fw-bold mb-3">Weekly Activity</h5>
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Pie Chart
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'pie',
        data: {
            labels: ['Thumbs Up', 'Peace', 'Fist', 'OK', 'Others'],
            datasets: [{
                data: [35, 25, 20, 10, 10],
                backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // Bar Chart
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
                label: 'Detections',
                data: [65, 59, 80, 81, 56, 55, 40],
                backgroundColor: '#4e73df'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
});
</script>
{% endblock %}
